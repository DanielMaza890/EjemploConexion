<h1>{{ duda.titulo }}</h1>
<p>{{ duda.contenido }}</p>
<hr>
<h3>Respuestas:</h3>
{% for resp in duda.respuestas.all %}
    <p>- {{ resp.contenido }}</p>
{% empty %}
    <p>No hay respuestas aún.</p>
{% endfor %}

<h4>Responder:</h4>
<form method="POST">
    {% csrf_token %}
    <textarea name="contenido" required></textarea><br>
    <button type="submit">Enviar respuesta</button>
</form>
<br>
<a href="{% url 'lista_dudas' %}">Volver</a>
